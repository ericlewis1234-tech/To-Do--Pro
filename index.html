<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Task Manager Pro</title>
<style>
body{font-family:Arial;margin:0;background:#eef2f7}
header{background:#1d4ed8;color:#fff;padding:16px;text-align:center}
.wrap{max-width:1100px;margin:auto;padding:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.card,.panel{background:#fff;padding:12px;border-radius:10px;box-shadow:0 2px 5px #0002}
.nav button{margin:2px;padding:8px 12px}
table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #ddd;padding:6px}
input[type=text],input[type=date]{width:100%;box-sizing:border-box}
.handle{cursor:move}
</style></head><body>
<header><h1>Task Manager Pro</h1></header>
<div class="wrap">
<div class="cards" id="cards"></div>
<div class="nav">
<button onclick="show('Priority')">Priority</button>
<button onclick="show('Weekly')">Weekly</button>
<button onclick="show('Daily')">Daily</button>
<button onclick="show('General')">General</button>
<button onclick="show('Things NOT to Do')">Things NOT to Do</button>
</div>
<div class="panel">
<h2 id="title"></h2>
<input id="newTask" placeholder="New task">
<input id="search" placeholder="Search all categories..." oninput="render()">
<button onclick="add()">Add</button>
<table><thead><tr><th></th><th>Done</th><th>Task</th><th>Due</th><th>Category</th><th>Move</th><th>Delete</th></tr></thead><tbody id="tb"></tbody></table>
</div></div>
<script>
const cats=["Priority","Weekly","Daily","General","Things NOT to Do"];
let db=JSON.parse(localStorage.getItem("tmpro")||"null")||Object.fromEntries(cats.map(c=>[c,[]]));
let current="Priority";
function save(){localStorage.setItem("tmpro",JSON.stringify(db));render();}
function show(c){current=c;render();}
function add(){let t=newTask.value.trim();if(!t)return;db[current].push({text:t,done:false,due:""});newTask.value="";save();}
function counts(){cards.innerHTML="";let total=0;cats.forEach(c=>{total+=db[c].length;cards.innerHTML+=`<div class='card'><b>${db[c].length}</b><br>${c}</div>`});cards.innerHTML+=`<div class='card'><b>${total}</b><br>Total</div>`}
function move(cat,i,to){let item=db[cat].splice(i,1)[0];db[to].push(item);save();}
function up(i){if(i<1)return;[db[current][i-1],db[current][i]]=[db[current][i],db[current][i-1]];save();}
function down(i){if(i>=db[current].length-1)return;[db[current][i+1],db[current][i]]=[db[current][i],db[current][i+1]];save();}
function render(){
title.textContent=current;
counts();
let q=search.value.toLowerCase();
tb.innerHTML="";
cats.forEach(cat=>{
 db[cat].forEach((x,i)=>{
  if(q && !(x.text.toLowerCase().includes(q)||cat.toLowerCase().includes(q)))return;
  if(!q && cat!==current)return;
  let dueStyle="";
  if(x.due){
    let d=new Date(x.due),today=new Date();today.setHours(0,0,0,0);
    if(d<today)dueStyle="style='background:#ffd6d6'";
    else if(d.getTime()==today.getTime())dueStyle="style='background:#fff3bf'";
  }
  tb.innerHTML+=`<tr draggable='true' ondragstart='window.drag={cat:"${cat}",i:${i}}' ondragover='event.preventDefault()' ondrop='dropRow("${cat}",${i})'>
<td class='handle'>☰</td>
<td><input type='checkbox' ${x.done?"checked":""} onchange='xchg("${cat}",${i},"done",this.checked)'></td>
<td><input type='text' value="${x.text.replace(/"/g,"&quot;")}" ${x.done?"style='text-decoration:line-through'":""} oninput='xchg("${cat}",${i},"text",this.value)'></td>
<td><input type='date' ${dueStyle} value='${x.due}' onchange='xchg("${cat}",${i},"due",this.value)'></td>
<td><select onchange='move("${cat}",${i},this.value)'>${cats.map(c=>`<option ${c==cat?"selected":""}>${c}</option>`).join("")}</select></td>
<td><button onclick='up(${i})'>↑</button><button onclick='down(${i})'>↓</button></td>
<td><button onclick='del("${cat}",${i})'>X</button></td></tr>`;
 });
});
}
function dropRow(cat,i){if(!window.drag)return;let it=db[drag.cat].splice(drag.i,1)[0];db[cat].splice(i,0,it);save();}
function xchg(c,i,f,v){db[c][i][f]=v;localStorage.setItem("tmpro",JSON.stringify(db));counts();}
function del(c,i){db[c].splice(i,1);save();}
render();
</script></body></html>
